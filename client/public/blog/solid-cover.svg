<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="SOLID: Five Principles That Survived Eighteen Years of Production">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="600" cy="315" r="420" fill="url(#glow)"/>

  <g opacity="0.08" stroke="#94a3b8" stroke-width="1" fill="none">
    <path d="M 0 120 L 1200 120 M 0 240 L 1200 240 M 0 360 L 1200 360 M 0 480 L 1200 480"/>
    <path d="M 240 0 L 240 630 M 480 0 L 480 630 M 720 0 L 720 630 M 960 0 L 960 630"/>
  </g>

  <g transform="translate(120, 90)">
    <rect x="0" y="0" width="44" height="4" fill="url(#accent)" rx="2"/>
    <text x="0" y="36" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="18" font-weight="600" letter-spacing="4" fill="#f97316">DESIGN PRINCIPLES</text>
  </g>

  <g transform="translate(120, 200)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-weight="800" font-size="180">
    <text x="0"   y="160" fill="#f97316">S</text>
    <text x="200" y="160" fill="#fb923c">O</text>
    <text x="420" y="160" fill="#fbbf24">L</text>
    <text x="600" y="160" fill="#34d399">I</text>
    <text x="680" y="160" fill="#22d3ee">D</text>
  </g>

  <g transform="translate(120, 400)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto">
    <text x="0" y="0" font-size="42" font-weight="700" fill="#f8fafc">Five Principles That Survived</text>
    <text x="0" y="56" font-size="42" font-weight="700" fill="#f8fafc">Eighteen Years of Production</text>
  </g>

  <g transform="translate(120, 540)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="18" fill="#94a3b8">
    <text x="0" y="0" font-weight="600" fill="#e2e8f0">Mohammad Khalid</text>
    <text x="0" y="26" opacity="0.7">Senior Solution Architect &#183; 18 years in .NET, Angular, React &amp; Azure</text>
  </g>

  <g transform="translate(960, 480)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#64748b">
    <rect x="0" y="-22" width="180" height="36" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="14" y="2" fill="#94a3b8">SRP &#183; OCP &#183; LSP &#183; ISP &#183; DIP</text>
  </g>

  <g transform="translate(1080, 110)" opacity="0.5">
    <circle cx="0" cy="0" r="6" fill="#f97316"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#f97316" stroke-width="1"/>
  </g>
</svg>
